name: Optimize and Deploy Resource Pack

on:
  push:
    branches:
      - main  # Triggers whenever you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip Resource Pack
        run: |
          zip -r pack.zip assets/ pack.mcmeta pack.png

      - name: Update Release
        uses: py7hon/actions-automatic-releases@v1.2.1
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "Latest Pack Build"
          files: |
            pack.zip
