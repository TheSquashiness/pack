- name: Zip Resource Pack
        run: |
          zip -r pack.zip assets/ pack.mcmeta

      - name: Generate SHA-1 Hash
        run: |
          sha1sum pack.zip | awk '{print $1}' > pack.zip.sha1

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          name: "Latest Pack Build"
          draft: false
          prerelease: false
          files: |
            pack.zip
            pack.zip.sha1
